name: Mirror dr-imad into repo

# One-off: pull Dr. Imad's live public_html into the repo's dr-imad/ folder using the
# existing FTPS secrets, so his (separately-built) site becomes repo-managed like the
# other 8. Read-only against the server (mirror = download). Excludes logs (PII) + cache.
# Commits with [skip ci] so it does NOT immediately redeploy the just-pulled files.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Mirror public_html -> dr-imad/
        run: |
          mkdir -p dr-imad
          lftp -u "${{ secrets.SFTP_USER }}","${{ secrets.SFTP_PASS }}" 145.79.58.156 <<'EOF'
          set ftp:ssl-force true
          set ssl:verify-certificate no
          set ftp:ssl-protect-data true
          set net:max-retries 3
          set net:timeout 25
          set mirror:parallel-transfer-count 4
          mirror --verbose --no-perms \
            --exclude-glob *.log \
            --exclude-glob leads.log \
            --exclude-glob errors.log \
            --exclude-glob *.swp \
            --exclude-glob .git/ \
            --exclude-glob cache/ \
            --exclude-glob wp-content/cache/ \
            domains/cioncancerdrimad.com/public_html/ dr-imad/
          bye
          EOF

      - name: Show what came down
        run: |
          echo "=== top-level of dr-imad/ ==="
          ls -la dr-imad/ | head -60
          echo "=== file count ==="
          find dr-imad -type f | wc -l
          echo "=== any leads.log (should be none) ==="
          find dr-imad -name '*.log' -o -name 'leads.log' | head

      - name: Commit mirror
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dr-imad
          git commit -m "Mirror dr-imad public_html into repo [skip ci]" || { echo "no changes"; exit 0; }
          git push
