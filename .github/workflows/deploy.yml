name: Deploy CION Doctor Sites

on:
  push:
    branches: [main]

jobs:
  # ── Step 1: Detect which dr-* folders changed ─────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed doctor folders
        id: set-matrix
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep '^dr-' \
            | cut -d/ -f1 \
            | sort -u \
            | jq -R . | jq -sc .)

          echo "Changed folders: $CHANGED"

          if [ "$CHANGED" = "[]" ] || [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix={\"doctor\":[]}" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "matrix={\"doctor\":$CHANGED}" >> $GITHUB_OUTPUT
          fi

  # ── Step 2: Deploy each changed doctor folder via SFTP (SSH key auth) ────
  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false

    concurrency:
      group: deploy-${{ matrix.doctor }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pre-accept Hostinger's host key (port 65002)
          ssh-keyscan -p 65002 -H 145.79.58.156 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Resolve server path for ${{ matrix.doctor }}
        id: resolve
        run: |
          # Full absolute paths on the server
          case "${{ matrix.doctor }}" in
            dr-imad)         SERVER_DIR="/home/u885652959/domains/cioncancerdrimad.com/public_html/" ;;
            dr-vinay)        SERVER_DIR="/home/u885652959/domains/cioncancerdrvinay.com/public_html/" ;;
            dr-murali)       SERVER_DIR="/home/u885652959/domains/cioncancerdrmurali.com/public_html/" ;;
            dr-sandeep)      SERVER_DIR="/home/u885652959/domains/cioncancerdrsandeep.com/public_html/" ;;
            dr-kiranmayee)   SERVER_DIR="/home/u885652959/domains/cioncancerdrkiranmayee.com/public_html/" ;;
            dr-basudev)      SERVER_DIR="/home/u885652959/domains/cioncancerdrbasudev.com/public_html/" ;;
            dr-raghvendra)   SERVER_DIR="/home/u885652959/domains/cioncancerdrraghvendra.com/public_html/" ;;
            dr-craghavendra) SERVER_DIR="/home/u885652959/domains/cioncancerdrcraghavendra.info/public_html/" ;;
            dr-owais)        SERVER_DIR="/home/u885652959/domains/cioncancerdrowais.com/public_html/" ;;
            *)
              echo "ERROR: Unknown doctor '${{ matrix.doctor }}'"
              exit 1
              ;;
          esac
          echo "server_dir=$SERVER_DIR" >> $GITHUB_OUTPUT
          echo "Deploying ${{ matrix.doctor }} → $SERVER_DIR"

      - name: Deploy via rsync over SSH
        run: |
          rsync -avz \
            --exclude='*.log' \
            --exclude='leads.log' \
            --exclude='errors.log' \
            --exclude='.git*' \
            -e "ssh -p 65002 -i $HOME/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            "./${{ matrix.doctor }}/" \
            "${{ secrets.SFTP_USER }}@145.79.58.156:${{ steps.resolve.outputs.server_dir }}"

      - name: Smoke-test deployment
        run: |
          DOMAIN=$(echo "${{ steps.resolve.outputs.server_dir }}" \
            | grep -oP '(?<=domains/).*(?=/public_html)')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 "https://$DOMAIN/" || echo "000")
          echo "$DOMAIN → HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "::warning::Could not reach $DOMAIN after deploy"
          fi
