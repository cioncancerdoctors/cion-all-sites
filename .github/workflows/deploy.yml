name: Deploy CION Doctor Sites

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      doctor:
        description: "Deploy a single doctor folder (e.g. dr-craghavendra). Blank = none."
        required: false
        default: ""

# Deploys changed dr-* folders to each doctor's public_html over FTPS.
# Switched from rsync/SSH (Hostinger throttled port 65002, causing intermittent
# "Connection timed out"). FTP-Deploy-Action only uploads CHANGED files (state file)
# and does NOT delete pre-existing remote files, matching the old no-delete behaviour.
#
# Uses existing secrets: SFTP_USER (username) + SFTP_PASS (the account password, which
# also works for FTP). No new secret needed. Server IP is hardcoded below.
# Manual test/redeploy: Actions -> Deploy CION Doctor Sites -> Run workflow -> enter a
# doctor folder (e.g. dr-craghavendra).

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Find changed doctor folders
        id: set-matrix
        run: |
          MANUAL="${{ github.event.inputs.doctor }}"
          if [ -n "$MANUAL" ]; then
            CHANGED=$(echo "$MANUAL" | jq -R . | jq -sc .)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD \
              | grep '^dr-' | cut -d/ -f1 | grep -v '^dr-imad$' | sort -u | jq -R . | jq -sc .)
          fi
          echo "Changed folders: $CHANGED"
          if [ "$CHANGED" = "[]" ] || [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix={\"doctor\":[]}" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "matrix={\"doctor\":$CHANGED}" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
      # One FTP connection at a time — Hostinger throttles concurrent control sockets.
      max-parallel: 1
    concurrency:
      group: deploy-${{ matrix.doctor }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Resolve domain for ${{ matrix.doctor }}
        id: resolve
        run: |
          case "${{ matrix.doctor }}" in
            dr-imad)         DOMAIN="cioncancerdrimad.com" ;;
            dr-vinay)        DOMAIN="cioncancerdrvinay.com" ;;
            dr-murali)       DOMAIN="cioncancerdrmurali.com" ;;
            dr-sandeep)      DOMAIN="cioncancerdrsandeep.com" ;;
            dr-kiranmayee)   DOMAIN="cioncancerdrkiranmayee.com" ;;
            dr-basudev)      DOMAIN="cioncancerdrbasudev.com" ;;
            dr-raghvendra)   DOMAIN="cioncancerdrraghvendra.com" ;;
            dr-craghavendra) DOMAIN="cioncancerdrcraghavendra.info" ;;
            dr-owais)        DOMAIN="cioncancerdrowais.com" ;;
            *) echo "ERROR: Unknown doctor '${{ matrix.doctor }}'"; exit 1 ;;
          esac
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "server_dir=domains/$DOMAIN/public_html/" >> $GITHUB_OUTPUT
          echo "Deploying ${{ matrix.doctor }} -> domains/$DOMAIN/public_html/"

      # Attempt 1 (Hostinger occasionally times out the FTP control socket).
      - name: Deploy via FTPS
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 145.79.58.156
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./${{ matrix.doctor }}/
          server-dir: ${{ steps.resolve.outputs.server_dir }}
          exclude: |
            **/.git*
            **/.git*/**
            **/*.log
            **/leads.log
            **/errors.log

      - name: Wait before retry
        if: steps.ftp1.outcome == 'failure'
        run: sleep 20

      # Attempt 2 (only if the first failed) — self-heals transient timeouts.
      - name: Deploy via FTPS (retry)
        if: steps.ftp1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 145.79.58.156
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./${{ matrix.doctor }}/
          server-dir: ${{ steps.resolve.outputs.server_dir }}
          exclude: |
            **/.git*
            **/.git*/**
            **/*.log
            **/leads.log
            **/errors.log

      - name: Smoke-test deployment
        run: |
          DOMAIN="${{ steps.resolve.outputs.domain }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://$DOMAIN/" || echo "000")
          echo "$DOMAIN -> HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then echo "::warning::Could not reach $DOMAIN after deploy"; fi
